<!DOCTYPE html>
<html lang="en">

<head>

	<meta charset="UTF-8">

	<meta
		name="viewport"
		content="width=device-width, initial-scale=1.0"
	>

	<title>Food Store</title>

	<link
		rel="stylesheet"
		href="../../../styles/global.css"
	>

	<link
		rel="stylesheet"
		href="../../../styles/components.css"
	>

	<link
		rel="stylesheet"
		href="../../../pages/store/home/store-home.css"
	>

</head>

<body>

	<div class="store-container">

		<header class="navbar">

			<h1 class="logo">
				Food Store
			</h1>

			<div class="navbar-actions">

				<button
					id="darkModeBtn"
					class="btn-secondary"
				>
					🌙 Dark Mode
				</button>

				<button
					id="goCart"
					class="btn-secondary"
				>
					Ir al carrito
				</button>

			</div>

		</header>

		<input
			type="text"
			id="search"
			class="input"
			placeholder="Buscar productos..."
		>

		<div id="categories"></div>

		<div id="products"></div>

	</div>

	<script
		type="module"
		src="./home.ts"
	></script>

</body>

</html>
